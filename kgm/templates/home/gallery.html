{% extends "home/base.html" %}
{% block title %}About{% endblock %}
{% block content %}
  <!-- Gallery Section -->
  <div class="mt-5">
    <h2 class="text-center text-secondary">Temple Gallery</h2>
    <div class="row mt-4">
    {% for img in images %}
      <div class="col-md-4 mb-4">
        <div class="card shadow-sm">
          <img src="{{ img.image.url }} " class="card-img-top" alt="{{ img.title }}">
          {% if img.title %}
            <div class="card-body">
              <p class="card-text text-center"> {{ img.title }}</p>
            </div>
          {% endif %}
        </div>
    </div>
  {% empty %}
    <p class="text-center">No images uploaded yet.</p>
  {% endfor %}
  </div>
{% endblock %}
