<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users</title>
</head>
<body>
    <h1> Here are users of this application</h1>
    {% if user_lst %}
    <ol>
        {% for person in user_lst %}
        <li>User Info</li>
        <ul>
            <li>First Name: {{ person.first_name }}</li>
            <li>Last Name: {{ person.last_name }}</li>
            <li>Email: {{ person.email }}</li>
        </ul>
        {% endfor %}
    </ol>
    {%endif%}

</body>
</html>
